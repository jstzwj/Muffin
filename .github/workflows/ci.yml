name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            configure-preset: conan-default
            conan-cppstd: 17
            test-command: ctest --preset conan-release --output-on-failure
          - name: macOS
            runner: macos-latest
            configure-preset: conan-release
            conan-cppstd: 17
            test-command: ctest --preset conan-release --output-on-failure
          - name: Linux
            runner: ubuntu-latest
            configure-preset: conan-release
            conan-cppstd: gnu17
            test-command: xvfb-run ctest --preset conan-release --output-on-failure

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        run: python -m pip install --upgrade conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl-dev

      - name: Install dependencies
        run: conan install . -s build_type=Release -s compiler.cppstd=${{ matrix.conan-cppstd }} --build=missing

      - name: Configure
        run: cmake --preset ${{ matrix.configure-preset }}

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ${{ matrix.test-command }}
