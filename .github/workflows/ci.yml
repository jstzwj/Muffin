name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            configure-preset: conan-default
            conan-cppstd: 17
            test-command: ctest --preset conan-release --output-on-failure
          - name: macOS
            runner: macos-latest
            configure-preset: conan-release
            conan-cppstd: 17
            test-command: ctest --preset conan-release --output-on-failure
          - name: Linux
            runner: ubuntu-latest
            configure-preset: conan-release
            conan-cppstd: gnu17
            test-command: xvfb-run ctest --preset conan-release --output-on-failure

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python tools
        run: python -m pip install --upgrade conan PySide6==6.10.2

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxau-dev \
            libxaw7-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbfile-dev \
            libxmu-dev \
            libxmuu-dev \
            libxpm-dev \
            libxrandr-dev \
            libxrender-dev \
            libxres-dev \
            libxss-dev \
            libxt-dev \
            libxtst-dev \
            libxv-dev \
            libxxf86vm-dev \
            libxcb-glx0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-dri2-0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-ewmh-dev \
            libxcb-res0-dev \
            libxcb-cursor-dev \
            libxcb-util-dev \
            uuid-dev \
            xvfb

      - name: Install dependencies
        run: conan install . -s build_type=Release -s compiler.cppstd=${{ matrix.conan-cppstd }} --build=missing

      - name: Clean Conan source to reduce cache size
        run: conan remove "*" -s -f
        shell: bash

      - name: Configure
        run: cmake --preset ${{ matrix.configure-preset }}

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ${{ matrix.test-command }}
