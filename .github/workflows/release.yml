name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact-suffix: windows-x64
            conan-arch: x86_64
            cmake-args: ''
            test-command: ctest --preset conan-release --output-on-failure
          - name: macOS x64
            runner: macos-13
            artifact-suffix: macos-x64
            conan-arch: x86_64
            cmake-args: -DCMAKE_OSX_ARCHITECTURES=x86_64
            test-command: ctest --preset conan-release --output-on-failure
          - name: Linux x64
            runner: ubuntu-latest
            artifact-suffix: linux-x64
            conan-arch: x86_64
            cmake-args: ''
            test-command: xvfb-run ctest --preset conan-release --output-on-failure

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.X.X format, got: $tag" >&2
            exit 1
          fi
          echo "MUFFIN_RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "MUFFIN_RELEASE_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        run: python -m pip install --upgrade conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: conan install . -s build_type=Release -s compiler.cppstd=17 -s arch=${{ matrix.conan-arch }} --build=missing

      - name: Configure
        run: cmake --preset conan-default -DMUFFIN_VERSION_OVERRIDE=${{ env.MUFFIN_RELEASE_VERSION }} ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ${{ matrix.test-command }}

      - name: Build distribution
        run: cmake --build --preset conan-release --target dist

      - name: Archive Windows distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/dist/* -DestinationPath "Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.zip"

      - name: Archive Unix distribution
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.tar.gz" -C build/dist .

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}
          path: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Muffin ${{ github.ref_name }}
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
