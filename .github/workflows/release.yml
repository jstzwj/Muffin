name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact-suffix: windows-x64
            conan-arch: x86_64
            configure-preset: conan-default
            conan-cppstd: 17
            cmake-args: ''
            test-command: ctest --preset conan-release --output-on-failure
          - name: macOS ARM64
            runner: macos-latest
            artifact-suffix: macos-arm64
            conan-arch: armv8
            configure-preset: conan-release
            conan-cppstd: 17
            cmake-args: ''
            test-command: ctest --preset conan-release --output-on-failure
          - name: Linux x64
            runner: ubuntu-latest
            artifact-suffix: linux-x64
            conan-arch: x86_64
            configure-preset: conan-release
            conan-cppstd: gnu17
            cmake-args: ''
            test-command: xvfb-run ctest --preset conan-release --output-on-failure

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.X.X format, got: $tag" >&2
            exit 1
          fi
          echo "MUFFIN_RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "MUFFIN_RELEASE_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python tools
        run: python -m pip install --upgrade conan PySide6==6.10.2

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxau-dev \
            libxaw7-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbfile-dev \
            libxmu-dev \
            libxmuu-dev \
            libxpm-dev \
            libxrandr-dev \
            libxrender-dev \
            libxres-dev \
            libxss-dev \
            libxt-dev \
            libxtst-dev \
            libxv-dev \
            libxxf86vm-dev \
            libxcb-glx0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-dri2-0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-ewmh-dev \
            libxcb-res0-dev \
            libxcb-cursor-dev \
            libxcb-util-dev \
            uuid-dev \
            xvfb

      - name: Install dependencies
        run: conan install . -s build_type=Release -s compiler.cppstd=${{ matrix.conan-cppstd }} -s arch=${{ matrix.conan-arch }} --build=missing

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix --version 4.0.5

      - name: Locate macdeployqt
        if: runner.os == 'macOS'
        id: macdeployqt
        shell: bash
        run: |
          DEPLOYQT=$(find ~/.conan2 -name macdeployqt -type f 2>/dev/null | head -1)
          if [ -n "$DEPLOYQT" ]; then
            echo "path=$DEPLOYQT" >> "$GITHUB_OUTPUT"
            echo "Found macdeployqt: $DEPLOYQT"
          else
            echo "::warning::macdeployqt not found in Conan cache"
          fi

      - name: Configure
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            export PATH="$PATH:$HOME/.dotnet/tools"
          fi
          if [ -n "${{ steps.macdeployqt.outputs.path }}" ]; then
            EXTRA_ARGS="-DMUFFIN_MACDEPLOYQT=${{ steps.macdeployqt.outputs.path }}"
          fi
          cmake --preset ${{ matrix.configure-preset }} -DMUFFIN_VERSION_OVERRIDE=${{ env.MUFFIN_RELEASE_VERSION }} ${{ matrix.cmake-args }} $EXTRA_ARGS

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ${{ matrix.test-command }}

      - name: Build distribution
        run: cmake --build --preset conan-release --target dist

      - name: Archive Windows distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/dist/* -DestinationPath "Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.zip"

      - name: Archive Unix distribution
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.tar.gz" -C build/Release/dist .

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}
          path: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-${{ matrix.artifact-suffix }}.*
          if-no-files-found: error

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          cmake --build --preset conan-release --target msi

      - name: Upload MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-windows-x64-msi
          path: build/Muffin-*-windows-x64.msi
          if-no-files-found: error

      - name: Build DMG disk image
        if: runner.os == 'macOS'
        run: cmake --build --preset conan-release --target dmg

      - name: Upload DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Muffin-${{ env.MUFFIN_RELEASE_TAG }}-macos-arm64-dmg
          path: build/Release/Muffin-*-macos-arm64.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Muffin ${{ github.ref_name }}
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.msi
            release-artifacts/**/*.dmg
