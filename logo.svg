<svg
    xmlns="http://www.w3.org/2000/svg"
    width="512"
    height="512"
    viewBox="0 0 512 512">

    <defs>
        <!-- 主卡片阴影 -->
        <filter id="cardShadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="140%">
            <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="6"
                flood-color="#000000"
                flood-opacity="0.08"/>

            <feDropShadow
                dx="0"
                dy="12"
                stdDeviation="18"
                flood-color="#000000"
                flood-opacity="0.10"/>
        </filter>

        <!-- 底层卡片阴影 -->
        <filter id="backShadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="140%">
            <feDropShadow
                dx="0"
                dy="8"
                stdDeviation="14"
                flood-color="#000000"
                flood-opacity="0.06"/>
        </filter>

        <filter id="letterShadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="140%">
            <feDropShadow
                dx="0"
                dy="10"
                stdDeviation="9"
                flood-color="#000000"
                flood-opacity="0.34"/>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect
        width="512"
        height="512"
        fill="none"/>

    <!-- 底层卡片 -->
    <rect
        x="46"
        y="46"
        width="420"
        height="420"
        rx="58"
        fill="#f3f3f3"
        filter="url(#backShadow)"
        transform="rotate(-5 256 256)"/>

    <!-- 主卡片 -->
    <rect
        x="46"
        y="46"
        width="420"
        height="420"
        rx="58"
        fill="#ffffff"
        filter="url(#cardShadow)"/>

    <!-- 左侧文本线 -->

    <!-- 右侧文本线 -->

    <!-- M -->
    <path
        fill="#252525"
        filter="url(#letterShadow)"
        transform="translate(256 1) scale(1.18 1) translate(-256 0)"
        d="
            M118 94
            H168
            L256 262
            L344 94
            H394

            V138
            H368

            V374
            H394
            V418

            H296
            V374
            H324

            V213
            L256 350

            L188 213
            V374

            H216
            V418

            H118
            V374
            H144

            V138
            H118
            Z
        "/>

</svg>
